# Application Name
spring.application.name=complaint-service

# Server Configuration
server.port=${PORT:8082}

# Database Connection (supply DB_URL, DB_USER, DB_PASS as env vars at runtime)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection Pool Limit (crucial for cloud free-tiers)
spring.datasource.hikari.maximum-pool-size=3

# Eureka Registration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# The Shared JWT Secret — MUST match the Auth Service exactly
sgsits.app.jwtSecret=${JWT_SECRET}

# File Storage
file.upload-dir=uploads/complaints
