# --- SERVER CONFIGURATION ---
# Render assigns a dynamic port using the PORT env var, defaulting to 10001 locally
server.port=${PORT:10001}
spring.application.name=complaint-service

# --- DATABASE CONNECTION (Aiven) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- HIBERNATE / JPA SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- CONNECTION POOL LIMIT ---
# Max pool size reduced to 2 to ensure Auth and Complaint services fit under the 5-connection limit
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000

# --- JWT SECURITY CONFIGURATION ---
college.app.jwtSecret=${JWT_SECRET}

# --- EUREKA CONFIGURATION ---
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:https://eureka-service-s7wp.onrender.com/eureka/}
# Removed localhost preference so Render can route internally

# --- CLOUDINARY STORAGE CONFIGURATION ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
management.endpoints.web.exposure.include=health
